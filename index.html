<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>KIMO ACADEMY | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-bg: #05070a; --card-bg: #0d1117; --red: #ff3131; --green: #00c851; --text: #e6edf3; --whatsapp: #25d366; }
        
        body { 
            margin: 0; 
            background: linear-gradient(-45deg, #05070a, #1a1f25, #0d1117, #05070a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas#particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        
        /* سحابة الدعم الفني */
        .support-cloud { position: fixed; bottom: 80px; left: 20px; background: var(--whatsapp); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); cursor: pointer; z-index: 9999; transition: 0.3s; animation: pulse 2s infinite; text-decoration: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        #floating-watermark { position: absolute; background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.4); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; pointer-events: none; z-index: 20000; display: none; transition: all 1.5s ease-in-out; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        
        #login-gate { position: fixed; inset: 0; background: var(--main-bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-box { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 20px rgba(255,49,49,0.2); }
        
        aside { width: 260px; background: rgba(1, 4, 9, 0.9); backdrop-filter: blur(10px); border-left: 1px solid #30363d; display: none; flex-direction: column; transition: 0.3s; }
        .nav-link { padding: 15px 20px; cursor: pointer; color: #8b949e; display: flex; align-items: center; gap: 12px; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { color: var(--red); background: rgba(255,49,49,0.05); border-right-color: var(--red); }
        
        main { flex: 1; overflow-y: auto; padding: 30px; display: none; position: relative; }
        .page { display: none; animation: fadeIn 0.5s ease-out; padding-bottom: 100px; }
        .active { display: block; }
        
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(5px); border-radius: 15px; padding: 25px; border: 1px solid #30363d; text-align: center; transition: 0.3s; }

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0d1117; border-radius: 10px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 12px; text-align: center; border-bottom: 1px solid #30363d; }
        .admin-table th { background: var(--red); color: white; }

        #video-player-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 15000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .video-container { width: 95%; max-width: 1000px; aspect-ratio: 16/9; background: #000; position: relative; border: 2px solid var(--red); border-radius: 15px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; text-align: center; }
        .btn-red { background: var(--red); color: #fff; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-play { background: var(--red); color: #fff; width: 90%; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

        footer { position: fixed; bottom: 0; left: 0; right: 0; background: #010409; color: #ffffff; text-align: center; padding: 15px 0; font-size: 13px; border-top: 2px solid var(--red); z-index: 1000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <a href="https://wa.me/201023175098" target="_blank" class="support-cloud" id="support-btn" style="display: none;"><i class="fab fa-whatsapp"></i></a>

    <div id="video-player-overlay">
        <div style="width: 95%; max-width: 1000px; display: flex; justify-content: space-between; margin-bottom: 15px;">
            <div id="timer-display" style="color:white; background:var(--red); padding:5px 15px; border-radius:20px;">وقت المذاكرة: 00:00</div>
            <button class="btn-red" style="width: auto;" onclick="closeVideo()">إغلاق ×</button>
        </div>
        <div class="video-container" id="video-frame-container"></div>
    </div>

    <div id="login-gate">
        <div class="gate-box">
            <h1 style="color:var(--red); margin:0 0 10px 0;">KIMO ACADEMY</h1>
            <input type="text" id="std-name" placeholder="الاسم الرباعي">
            <input type="tel" id="std-phone" placeholder="رقم الموبايل">
            <button class="btn-red" onclick="checkGate()">دخول المنصة 🚀</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 25px; font-size: 20px; font-weight: bold; color: var(--red);">KIMO ACADEMY</div>
        <div class="nav-link active" onclick="tab(this, 'p-home')"><i class="fas fa-home"></i> الرئيسية</div>
        <div class="nav-link" onclick="tab(this, 'p-lessons')"><i class="fas fa-play-circle"></i> محاضراتي</div>
        <div class="nav-link" onclick="tab(this, 'p-files')"><i class="fas fa-file-pdf"></i> الملازم</div>
        
        <div id="adm-links" style="display:none; border-top:1px solid #333; margin-top:10px; padding-top:10px;">
            <div class="nav-link" style="color:var(--green)" onclick="tab(this, 'p-students')"><i class="fas fa-users"></i> قائمة الطلاب 👥</div>
            <div class="nav-link" style="color:var(--green)" onclick="tab(this, 'p-admin')"><i class="fas fa-cog"></i> الإدارة</div>
        </div>

        <div class="nav-link" style="margin-top:auto; color:#ff4d4d" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</div>
    </aside>

    <main id="content">
        <div id="p-home" class="page active">
            <h1>مرحباً، <span id="display-name" style="color:var(--red)"></span> 🔥</h1>
            <div id="latest-content" class="content-grid"></div>
        </div>
        <div id="p-lessons" class="page"><h2>🎥 المحاضرات</h2><div id="lessons-list" class="content-grid"></div></div>
        <div id="p-files" class="page"><h2>📄 الملازم</h2><div id="files-list" class="content-grid"></div></div>
        
        <div id="p-students" class="page">
            <h2>قائمة الطلاب المسجلين 👥</h2>
            <div class="card" style="overflow-x: auto;">
                <table class="admin-table">
                    <thead><tr><th>الاسم</th><th>الموبايل</th><th>تاريخ الدخول</th></tr></thead>
                    <tbody id="students-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="p-admin" class="page">
            <h2>لوحة الإدارة 🚀</h2>
            <div class="card">
                <input type="text" id="adm-title" placeholder="عنوان المحتوى">
                <input type="text" id="adm-url" placeholder="الرابط">
                <select id="adm-type"><option value="video">فيديو 🎥</option><option value="file">ملزمة 📄</option></select>
                <button class="btn-red" onclick="secureUpload()">نشر الآن ✅</button>
            </div>
        </div>
    </main>

    <footer>جميع الحقوق محفوظة للمطور <b>كريم محمود</b> © 2026</footer>
    <div id="floating-watermark"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            authDomain: "kimo-academy-48541.firebaseapp.com",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            storageBucket: "kimo-academy-48541.firebasestorage.app",
            messagingSenderId: "385013785557",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const lessonsRef = database.ref('lessons');
        const studentsRef = database.ref('students');
        let timerInterval, watermarkInterval, seconds = 0, initialLoad = true;

        function checkGate() {
            const name = document.getElementById('std-name').value;
            const phone = document.getElementById('std-phone').value;
            if (name.trim() !== "" && phone.length >= 11) {
                const studentData = { name, phone, loginTime: new Date().toLocaleString('ar-EG') };
                studentsRef.push(studentData);
                localStorage.setItem('kimo_auth_v25', JSON.stringify(studentData));
                runApp();
            } else { alert("بيانات غير مكتملة!"); }
        }

        function runApp() {
            const data = JSON.parse(localStorage.getItem('kimo_auth_v25'));
            if(!data) return;
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('content').style.display = 'block';
            document.getElementById('support-btn').style.display = 'flex';
            document.getElementById('display-name').innerText = data.name.split(' ')[0];
            
            if (data.phone === "01023175098") {
                document.getElementById('adm-links').style.display = 'block';
                loadStudents();
            }
            loadData();
            if ("Notification" in window) Notification.requestPermission();
            lessonsRef.limitToLast(1).on('child_added', (snap) => {
                if (initialLoad) { initialLoad = false; return; }
                if (Notification.permission === "granted") new Notification("KIMO ACADEMY 🚀", { body: "تم إضافة: " + snap.val().title });
            });
        }

        function loadStudents() {
            studentsRef.on('value', (snap) => {
                const data = snap.val(); let rows = "";
                for (let id in data) rows += `<tr><td>${data[id].name}</td><td>${data[id].phone}</td><td>${data[id].loginTime}</td></tr>`;
                document.getElementById('students-table-body').innerHTML = rows;
            });
        }

        function loadData() {
            lessonsRef.on('value', (snap) => {
                const data = snap.val(); const vList = [], fList = [], all = [];
                for (let id in data) {
                    const item = data[id];
                    if(item.type === 'video') vList.push(item); else fList.push(item);
                    all.push(item);
                }
                const html = (i) => `<div class="card"><h3>${i.title}</h3><button class="btn-play" onclick="openContent('${i.url}','${i.type}')">${i.type==='video'?'شاهد':'تحميل'}</button></div>`;
                document.getElementById('lessons-list').innerHTML = vList.reverse().map(html).join('');
                document.getElementById('files-list').innerHTML = fList.reverse().map(html).join('');
                document.getElementById('latest-content').innerHTML = `<h2>آخر التحديثات 📢</h2>` + all.reverse().slice(0, 4).map(html).join('');
            });
        }

        function openContent(url, type) {
            if (type === 'video') {
                let id = url.split('v=')[1] || url.split('/').pop();
                document.getElementById('video-frame-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
                document.getElementById('video-player-overlay').style.display = 'flex';
                seconds = 0; timerInterval = setInterval(() => {
                    seconds++; let m = Math.floor(seconds / 60), s = seconds % 60;
                    document.getElementById('timer-display').innerText = `وقت المذاكرة: ${m}:${s < 10 ? '0'+s : s}`;
                }, 1000);
                watermarkInterval = setInterval(moveWatermark, 4000); moveWatermark();
            } else { window.open(url, '_blank'); }
        }

        function moveWatermark() {
            const wm = document.getElementById('floating-watermark'), data = JSON.parse(localStorage.getItem('kimo_auth_v25'));
            if(data) {
                wm.innerText = `${data.name} - ${data.phone}`; wm.style.display = 'block';
                wm.style.left = Math.random() * (window.innerWidth - 150) + 'px';
                wm.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            }
        }

        function closeVideo() { 
            document.getElementById('video-player-overlay').style.display = 'none'; 
            document.getElementById('video-frame-container').innerHTML = ""; 
            clearInterval(timerInterval); clearInterval(watermarkInterval);
            document.getElementById('floating-watermark').style.display = 'none';
        }

        function secureUpload() {
            const title = document.getElementById('adm-title').value, url = document.getElementById('adm-url').value, type = document.getElementById('adm-type').value;
            if(title && url) lessonsRef.push({ title, url, type }).then(() => alert("تم النشر!"));
        }

        function logout() { localStorage.removeItem('kimo_auth_v25'); location.reload(); }
        function tab(el, id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        window.onload = () => { if (localStorage.getItem('kimo_auth_v25')) runApp(); };
    </script>
</body>
</html>
