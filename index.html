<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "7e6da62d-7c47-4c0f-93ba-7e6d2189e1b5",
    });
  });
  window.onerror = function() { return true; };
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كيمو أكاديمي | 2026</title>
    
    <link rel="stylesheet" href="سي اس اس.css">

    <link rel="icon" href="https://raw.githubusercontent.com/ky8694429-oss/kimo-academy/main/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ستايلات الـ Layout الأساسية عشان المنصة متضربش */
        body { margin: 0; font-family: 'Cairo', sans-serif; display: flex; min-height: 100vh; overflow-x: hidden; }
        aside { width: 280px; position: sticky; top: 0; height: 100vh; z-index: 999; display: none; flex-direction: column; }
        main { flex: 1; padding: 20px; padding-top: 100px; display: none; }
        .page { display: none; }
        .page.active { display: block; }
        #watermark { position: absolute; z-index: 2147483647; color: rgba(255,255,255,0.3); font-weight: 900; pointer-events: none; }
        .video-container { width: 100%; height: 85vh; background: #000; }
        @media (max-width: 768px) { aside { display: none !important; } .mobile-nav { display: flex !important; } }
        /* استايلات الشات والطلاب عشان تفضل شغالة */
        #chat-messages { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .student-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 selection:bg-blue-500/30" oncontextmenu="return false;"> 

    <div id="notification-toast" class="fixed -top-20 left-1/2 -translate-x-1/2 bg-blue-600 p-4 rounded-full z-[50000] transition-all duration-500">
        <i class="fas fa-bell"></i> <span id="notif-text">تنبيه من كيمو!</span>
    </div>

    <div id="top-bar" class="fixed top-0 inset-x-0 h-16 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-[998] hidden items-center justify-end px-6 gap-4">
        <div id="admin-live-info" style="display:none;" class="text-blue-400 font-bold">
            <i class="fas fa-eye"></i> <span id="online-now" class="en-num">0</span>
        </div>
        <button class="bg-slate-800 p-2 rounded-lg" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <aside id="sidebar" class="bg-slate-950 border-l border-slate-800">
        <div class="p-6 text-center">
            <h2 class="text-2xl font-black text-white">KAREEM<span class="text-blue-500">👑</span></h2>
        </div>
        <div class="nav-link p-4 cursor-pointer hover:bg-blue-600/10 active" onclick="tab(this, 'p-home')"><i class="fas fa-home ml-3"></i>الرئيسية</div>
        <div class="nav-link p-4 cursor-pointer hover:bg-blue-600/10" onclick="tab(this, 'p-courses')"><i class="fas fa-graduation-cap ml-3"></i>الكورسات</div>
        <div class="nav-link p-4 cursor-pointer hover:bg-blue-600/10" onclick="tab(this, 'p-lessons')"><i class="fas fa-play-circle ml-3"></i>المحاضرات</div>
        <div class="nav-link p-4 cursor-pointer hover:bg-blue-600/10" onclick="tab(this, 'p-files')"><i class="fas fa-file-pdf ml-3"></i>PDF</div>
        <div class="nav-link p-4 cursor-pointer hover:bg-blue-600/10" onclick="tab(this, 'p-chat')"><i class="fas fa-comments ml-3"></i>الدردشة</div>
        <div id="adm-links" style="display:none;" class="border-t border-slate-800 mt-4">
            <div class="p-4 text-green-500 cursor-pointer" onclick="tab(this, 'p-students')"><i class="fas fa-users-cog ml-3"></i>الطلاب</div>
            <div class="p-4 text-green-500 cursor-pointer" onclick="tab(this, 'p-admin')"><i class="fas fa-tools ml-3"></i>الإدارة</div>
        </div>
    </aside>

    <main id="content">
        <div id="p-home" class="page active">
            <div class="bg-blue-600 p-8 rounded-3xl mb-8">
                <h1 class="text-2xl font-bold">مرحباً، <span id="display-name" class="text-yellow-400">طالبنا</span> 👋</h1>
            </div>
            <h3>آخر الدروس المضافة:</h3>
            <div id="latest-content"></div>
        </div>

        <div id="p-courses" class="page">
            <h2 class="text-xl font-bold mb-4">الكورسات المدفوعة 🎓</h2>
            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            <div id="course-details" style="display:none;">
                <button class="bg-slate-800 p-2 rounded mb-4" onclick="showCoursesGrid()">رجوع</button>
                <h3 id="current-course-title"></h3>
                <div id="course-lessons-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <div id="p-lessons" class="page"><h2>المحاضرات 🎥</h2><div id="subjects-grid-video" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
        <div id="p-chat" class="page">
            <div class="bg-slate-800 p-4 rounded-2xl">
                <div id="chat-messages"></div>
                <div class="flex gap-2 mt-4">
                    <input type="text" id="chat-input" class="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-700">
                    <button class="bg-blue-600 px-6 rounded-xl font-bold" onclick="sendChatMessage()">إرسال</button>
                </div>
            </div>
        </div>
        
        <div id="p-admin" class="page">
            <div class="bg-slate-800 p-6 rounded-2xl border border-blue-500/50 mb-6">
                <h3 class="mb-4">➕ إضافة درس سريع</h3>
                <input type="text" id="free-lesson-title" placeholder="العنوان" class="w-full bg-slate-950 p-3 rounded-xl mb-2">
                <input type="text" id="free-lesson-url" placeholder="الرابط" class="w-full bg-slate-950 p-3 rounded-xl mb-4">
                <button class="w-full bg-blue-600 py-3 rounded-xl font-bold" onclick="uploadFreeLesson()">نشر الآن 🚀</button>
            </div>
        </div>
        
        <div id="p-students" class="page">
            <h2>إدارة الطلاب 🛰️</h2>
            <div id="students-table-body" class="bg-slate-800 rounded-2xl p-4"></div>
        </div>
    </main>

    <div id="login-gate" class="fixed inset-0 bg-slate-950 z-[10000] flex items-center justify-center p-4">
        <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 w-full max-w-[400px] text-center">
            <h2 class="text-xl font-bold mb-6">تسجيل الدخول - كيمو أكاديمي</h2>
            <div id="step-1">
                <input type="tel" id="std-phone" placeholder="رقم الموبايل" class="w-full bg-slate-950 p-4 rounded-xl mb-4 text-center">
                <button class="w-full bg-blue-600 py-4 rounded-xl font-bold" onclick="identifyStudent()">دخول</button>
            </div>
            <div id="step-login" style="display:none;">
                <p id="welcome-back" class="mb-4 text-blue-400"></p>
                <input type="password" id="std-pass" placeholder="كلمة المرور" class="w-full bg-slate-950 p-4 rounded-xl mb-4 text-center">
                <button class="w-full bg-blue-600 py-4 rounded-xl font-bold" onclick="verifyPassword()">تأكيد</button>
            </div>
            <div id="step-register" style="display:none;">
                <input type="text" id="reg-name" placeholder="الاسم الثلاثي" class="w-full bg-slate-950 p-4 rounded-xl mb-2">
                <input type="password" id="reg-pass" placeholder="كلمة مرور جديدة" class="w-full bg-slate-950 p-4 rounded-xl mb-4">
                <button class="w-full bg-blue-600 py-4 rounded-xl font-bold" onclick="completeRegistration()">إنشاء حساب</button>
            </div>
        </div>
    </div>

    <div id="video-player-overlay" class="fixed inset-0 bg-black z-[60000] hidden flex-col items-center justify-center">
        <button class="absolute top-4 right-4 bg-red-600 px-4 py-2 rounded-lg font-bold" onclick="closeVideo()">إغلاق ×</button>
        <div class="video-container" id="video-frame-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        // هنا رجعت لك كل الـ Firebase Logic بتاعك بالحرف
        const firebaseConfig = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            authDomain: "kimo-academy-48541.firebaseapp.com",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            storageBucket: "kimo-academy-48541.appspot.com",
            messagingSenderId: "385013785557",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const lessonsRef = database.ref('lessons'), studentsRef = database.ref('students'), 
              presenceRef = database.ref('online_students'), chatRef = database.ref('chat'), 
              coursesRef = database.ref('courses');

        let allData = {}, allCourses = {}, currentStudentData = null;

        // وظائف الدخول
        async function identifyStudent() {
            const phone = document.getElementById('std-phone').value.trim();
            const snapshot = await studentsRef.child(phone).once('value');
            const student = snapshot.val();
            document.getElementById('step-1').style.display = 'none';
            if (student && student.password) {
                currentStudentData = student;
                document.getElementById('step-login').style.display = 'block';
                document.getElementById('welcome-back').innerText = `أهلاً يا ${student.name}`;
            } else {
                document.getElementById('step-register').style.display = 'block';
            }
        }

        function verifyPassword() {
            if (document.getElementById('std-pass').value === currentStudentData.password) saveAndLogin(currentStudentData);
            else alert("خطأ!");
        }

        function completeRegistration() {
            const phone = document.getElementById('std-phone').value, name = document.getElementById('reg-name').value, pass = document.getElementById('reg-pass').value;
            const newData = { name, phone, password: pass };
            studentsRef.child(phone).update(newData);
            saveAndLogin(newData);
        }

        function saveAndLogin(data) { localStorage.setItem('kimo_auth_v26', JSON.stringify(data)); runApp(); }

        function runApp() {
            const user = JSON.parse(localStorage.getItem('kimo_auth_v26'));
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('content').style.display = 'block';
            document.getElementById('display-name').innerText = user.name;
            presenceRef.child(user.phone).set({ name: user.name, last: Date.now() });

            if(user.phone === "01023175098") {
                document.getElementById('adm-links').style.display = 'block';
                document.getElementById('admin-live-info').style.display = 'block';
                presenceRef.on('value', s => document.getElementById('online-now').innerText = s.numChildren());
            }
            lessonsRef.on('value', s => { allData = s.val() || {}; renderLatest(); });
            coursesRef.on('value', s => { allCourses = s.val() || {}; renderCourses(); });
            chatRef.limitToLast(20).on('child_added', s => {
                const msg = s.val(), box = document.getElementById('chat-messages');
                box.innerHTML += `<div class="p-3 bg-slate-700 rounded-xl"><b>${msg.name}:</b> ${msg.text}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }

        function renderLatest() {
            let h = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            Object.entries(allData).reverse().slice(0, 8).forEach(([id, i]) => {
                h += `<div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                    <h4 class="mb-4 font-bold text-center">${i.title}</h4>
                    <button class="w-full bg-blue-600 py-2 rounded-xl" onclick="openContent('${i.url}','video')">فتح الدرس</button>
                </div>`;
            });
            document.getElementById('latest-content').innerHTML = h + `</div>`;
        }

        function openContent(url, type) {
            const user = JSON.parse(localStorage.getItem('kimo_auth_v26'));
            if (type === 'video') {
                document.getElementById('video-player-overlay').style.display = 'flex';
                document.getElementById('video-frame-container').innerHTML = `
                    <div id="watermark" style="top:30%; left:30%;">${user.name} - ${user.phone}</div>
                    <iframe src="${url.includes('t.me') ? url+'?embed=1' : url}" width="100%" height="100%" frameborder="0"></iframe>`;
            } else { window.open(url, '_blank'); }
        }

        function closeVideo() { document.getElementById('video-player-overlay').style.display = 'none'; }
        function tab(el, id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function sendChatMessage() {
            const user = JSON.parse(localStorage.getItem('kimo_auth_v26'));
            const text = document.getElementById('chat-input').value;
            if(text) { chatRef.push({ name: user.name, text: text }); document.getElementById('chat-input').value = ""; }
        }
        window.onload = function() { if (localStorage.getItem('kimo_auth_v26')) runApp(); };
    </script>
</body>
</html>
