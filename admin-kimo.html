<script>
async function sendPush() {
    const title = document.getElementById('notif-title').value;
    const body = document.getElementById('notif-body').value;
    const btn = document.getElementById('send-btn');
    
    if(!title || !body) return;

    btn.innerText = "جاري الإرسال...";
    btn.disabled = true;

    const APP_ID = "7e6da62d-7c47-4c0f-93ba-7e6d2189e1b5";
    const API_KEY = "os_v2_app_pzw2mll4i5ga7e52pzwsdcpbwubglqvp2brulenthowuuxvi42idb4uohluaeydvs5aihziaqacjokpw3tldpcunvljuiv6k567p2uq";

    const proxyUrl = "https://cors-anywhere.herokuapp.com/";
    const apiUrl = "https://onesignal.com/api/v1/notifications";

    try {
        const response = await fetch(proxyUrl + apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Basic " + API_KEY // جربنا Basic بدل Key
            },
            body: JSON.stringify({
                app_id: APP_ID,
                included_segments: ["Total Subscriptions"],
                headings: {"en": title},
                contents: {"en": body}
            })
        });

        const data = await response.json();
        btn.disabled = false;
        btn.innerText = "إرسال للجميع الآن 🚀";

        if (response.ok) {
            alert("✅ أخيراً يا كيمو! اشتغلت.");
        } else {
            // لو فشلت تاني، جرب نشيل كلمة Basic خالص
            const retryResponse = await fetch(proxyUrl + apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": API_KEY 
                },
                body: JSON.stringify({
                    app_id: APP_ID,
                    included_segments: ["Total Subscriptions"],
                    headings: {"en": title},
                    contents: {"en": body}
                })
            });
            if(retryResponse.ok) alert("✅ اشتغلت في المحاولة التانية!");
            else alert("❌ لسه معصلجة.. ابعتلي سكرين باللي طلع");
        }
    } catch (error) {
        btn.disabled = false;
        window.open("https://cors-anywhere.herokuapp.com/corsdemo", "_blank");
    }
}
</script>
