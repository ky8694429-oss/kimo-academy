<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAREEM ACADEMY PRO | 2026</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- الجذر والمتغيرات الشاملة (1-100) --- */
        :root {
            --bg-dark: #010409; --bg-card: #0d1117; --accent: #FF9800; 
            --accent-glow: rgba(255, 152, 0, 0.4); --text-main: #e6edf3;
            --danger: #ff4d4d; --success: #00c851; --gold: #FFD700;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; outline: none; }
        body {
            margin: 0; background: var(--bg-dark); color: var(--text-main);
            font-family: 'Cairo', sans-serif; overflow-x: hidden;
            user-select: none; -webkit-user-drag: none;
        }

        /* --- الحماية من التصوير والطباعة (101-200) --- */
        @media print { body { display: none !important; } }
        #watermark {
            position: fixed; pointer-events: none; z-index: 99999;
            color: rgba(255, 255, 255, 0.15); font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); white-space: nowrap;
        }

        /* --- أنيميشن تجميع اسم KAREEM (201-300) --- */
        .kareem-intro {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #000;
        }
        .name-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .letter {
            font-size: 60px; font-weight: 900; color: #fff;
            opacity: 0; transform: scale(5) rotate(45deg);
            filter: blur(10px); animation: assemble 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes assemble {
            to { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); text-shadow: 0 0 20px var(--accent); }
        }
        .letter:nth-child(1) { animation-delay: 0.1s; }
        .letter:nth-child(2) { animation-delay: 0.2s; }
        .letter:nth-child(3) { animation-delay: 0.3s; }
        .letter:nth-child(4) { animation-delay: 0.4s; }
        .letter:nth-child(5) { animation-delay: 0.5s; }
        .letter:nth-child(6) { animation-delay: 0.6s; }

        /* --- تصميم القائمة الجانبية المتقدم (301-400) --- */
        aside {
            width: var(--sidebar-width); height: 100vh; background: var(--bg-card);
            position: fixed; right: 0; top: 0; z-index: 1000;
            border-left: 1px solid #30363d; transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .nav-item {
            padding: 18px 25px; cursor: pointer; display: flex; align-items: center;
            gap: 15px; color: #8b949e; border-bottom: 1px solid #21262d;
            transition: 0.3s; font-weight: bold;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--accent); background: #161b22;
            border-right: 4px solid var(--accent);
        }

        /* --- نظام الكروت والـ 3D (401-500) --- */
        .page-container { margin-right: var(--sidebar-width); padding: 40px; min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .glass-card {
            background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; border: 1px solid #30363d;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5); transition: 0.5s;
            position: relative; overflow: hidden;
        }
        .glass-card:hover { transform: translateY(-10px) rotateX(5deg); border-color: var(--accent); }

        /* --- نظام الامتحانات (501-600) --- */
        .exam-box { display: none; background: #0d1117; padding: 30px; border-radius: 15px; }
        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #161b22; border: 1px solid #333; color: #fff;
            text-align: right; border-radius: 10px; cursor: pointer;
        }
        .option-btn:hover { background: var(--accent); color: #000; }

        /* --- لوحة الإدارة (601-700) --- */
        .admin-panel { background: #161b22; padding: 20px; border-radius: 15px; border: 2px dashed var(--accent); }
        input, select, textarea {
            width: 100%; padding: 15px; margin: 10px 0; background: #0d1117;
            border: 1px solid #30363d; color: #fff; border-radius: 10px;
        }

        /* --- استعلامات الموبايل (701-800+) --- */
        @media (max-width: 992px) {
            aside { transform: translateX(100%); }
            .page-container { margin-right: 0; padding: 20px; }
            .mobile-menu-btn { display: block; }
        }

        /* زر الأكشن */
        .btn-main {
            background: linear-gradient(135deg, var(--accent), #e65100);
            color: #000; border: none; padding: 15px 30px; border-radius: 12px;
            font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }

        /* شريط الإشعارات */
        .marquee-news {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--accent);
            color: #000; font-weight: bold; z-index: 2000; padding: 5px 0;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="watermark"></div>

    <div id="auth-gate" class="kareem-intro">
        <div class="name-container">
            <span class="letter">K</span><span class="letter">A</span><span class="letter">R</span>
            <span class="letter">E</span><span class="letter">E</span><span class="letter">M</span>
        </div>
        <div id="login-form" class="glass-card" style="width: 350px;">
            <input type="tel" id="user-phone" placeholder="رقم الموبايل">
            <div id="pass-area" style="display:none;">
                <input type="password" id="user-pass" placeholder="كلمة السر">
            </div>
            <button class="btn-main" onclick="handleAuth()">دخول للمنصة 🚀</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="marquee-news">
            <marquee id="news-ticker">جاري تحميل أحدث الأخبار والدروس...</marquee>
        </div>

        <aside id="main-sidebar">
            <div style="padding: 30px; text-align: center;">
                <div style="font-size: 24px; font-weight: 900; color: var(--accent);">KAREEM ACADEMY</div>
            </div>
            <div class="nav-item active" onclick="nav('home')"><i class="fas fa-th-large"></i> لوحة التحكم</div>
            <div class="nav-item" onclick="nav('lessons')"><i class="fas fa-video"></i> المحاضرات</div>
            <div class="nav-item" onclick="nav('exams')"><i class="fas fa-file-signature"></i> بنك الامتحانات</div>
            <div class="nav-item" onclick="nav('store')"><i class="fas fa-shopping-cart"></i> المتجر</div>
            <div class="nav-item" onclick="nav('chat')"><i class="fas fa-comments"></i> مجتمع الطلاب</div>
            <div id="admin-only" style="display:none;">
                <div class="nav-item" onclick="nav('admin')" style="color: var(--success);"><i class="fas fa-user-crown"></i> الإدارة العليا</div>
            </div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: var(--danger);"><i class="fas fa-sign-out-alt"></i> خروج</div>
        </aside>

        <main class="page-container">
            <div id="page-home" class="tab-page">
                <h2>أهلاً بك يا <span id="student-name" style="color: var(--accent);">بطل</span></h2>
                <div class="grid-layout">
                    <div class="glass-card">
                        <h3><i class="fas fa-star" style="color: gold;"></i> نقاطك</h3>
                        <p id="student-points" style="font-size: 2rem; font-weight: 900;">0</p>
                    </div>
                    <div class="glass-card">
                        <h3><i class="fas fa-clock"></i> حصص اليوم</h3>
                        <p>لا يوجد حصص اليوم</p>
                    </div>
                </div>
            </div>

            <div id="page-lessons" class="tab-page" style="display:none;">
                <h2>المحاضرات المرفوعة</h2>
                <div id="lessons-grid" class="grid-layout"></div>
            </div>

            <div id="page-admin" class="tab-page" style="display:none;">
                <h2>لوحة تحكم كيمو</h2>
                <div class="admin-panel">
                    <h3>رفع درس جديد</h3>
                    <input type="text" id="new-title" placeholder="اسم المحاضرة">
                    <input type="text" id="new-url" placeholder="رابط المحاضرة">
                    <button class="btn-main" onclick="uploadLesson()">نشر المحاضرة</button>
                </div>
            </div>
        </main>
    </div>

    <div id="video-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:10000;">
        <button onclick="closePlayer()" style="position:absolute; top:20px; left:20px; color:#fff; background:red; border:none; padding:10px 20px; border-radius:5px; z-index:11000;">إغلاق X</button>
        <div id="player-target" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // --- تهيئة الفايربيز (801-900+) ---
        const config = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        firebase.initializeApp(config);
        const database = firebase.database();

        let myData = null;

        // --- نظام المصادقة الذكي ---
        async function handleAuth() {
            const phone = document.getElementById('user-phone').value;
            if(!phone) return alert("اكتب الرقم!");

            const snap = await database.ref('students/' + phone).once('value');
            if(snap.exists()) {
                document.getElementById('pass-area').style.display = 'block';
                const pass = document.getElementById('user-pass').value;
                if(pass) {
                    if(pass === snap.val().password) setupSession(snap.val());
                    else alert("كلمة السر خطأ!");
                }
            } else {
                // تسجيل جديد تلقائي
                const name = prompt("أهلاً بك! اكتب اسمك الثلاثي للتسجيل:");
                const password = prompt("اختر كلمة سر قوية:");
                if(name && password) {
                    const newUser = { name, phone, password, points: 50, role: 'student' };
                    await database.ref('students/' + phone).set(newUser);
                    setupSession(newUser);
                }
            }
        }

        function setupSession(user) {
            localStorage.setItem('kimo_session', JSON.stringify(user));
            location.reload();
        }

        window.onload = () => {
            const session = localStorage.getItem('kimo_session');
            if(session) {
                myData = JSON.parse(session);
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('student-name').innerText = myData.name;
                document.getElementById('student-points').innerText = myData.points || 0;
                
                if(myData.phone === "01023175098") document.getElementById('admin-only').style.display = 'block';
                
                loadData();
                startWatermark();
            }
        };

        // --- إدارة البيانات المحترفة ---
        function loadData() {
            database.ref('lessons').on('value', snap => {
                let html = '';
                snap.forEach(c => {
                    const l = c.val();
                    html += `
                        <div class="glass-card">
                            <div style="height:150px; background:#161b22; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                                <i class="fas fa-play-circle" style="font-size:3rem; color:var(--accent);"></i>
                            </div>
                            <h3>${l.title}</h3>
                            <button class="btn-main" onclick="viewLesson('${l.url}')">بدء المشاهدة</button>
                        </div>
                    `;
                });
                document.getElementById('lessons-grid').innerHTML = html;
            });

            database.ref('news').on('value', s => {
                document.getElementById('news-ticker').innerText = s.val() || "مرحباً بك في كيمو أكاديمي 2026";
            });
        }

        function viewLesson(url) {
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('player-target').innerHTML = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }

        function closePlayer() {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('player-target').innerHTML = '';
        }

        // --- نظام الحماية المتقدم ---
        function startWatermark() {
            const wm = document.getElementById('watermark');
            wm.innerText = `${myData.name} | ${myData.phone}`;
            setInterval(() => {
                wm.style.top = Math.random() * 90 + "vh";
                wm.style.left = Math.random() * 80 + "vw";
                wm.style.opacity = Math.random() * 0.3;
            }, 3000);
        }

        function nav(page) {
            document.querySelectorAll('.tab-page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + page).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function uploadLesson() {
            const title = document.getElementById('new-title').value;
            const url = document.getElementById('new-url').value;
            if(title && url) {
                database.ref('lessons').push({ title, url });
                alert("تم الرفع بنجاح يا مستر كيمو!");
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // تعطيل الاختصارات المشبوهة
        document.onkeydown = (e) => {
            if(e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'i')) return false;
            if(e.key === 'F12') return false;
        };
    </script>
</body>
</html>
