<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>KAREEM ACADEMY | 2026</title>
    
    <link rel="stylesheet" href="https://ky8694429-oss.github.io/kimo-academy/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* تعريف الألوان الأساسية لضمان عمل الواجهة فوراً */
        :root { --accent: #FF9800; --main-bg: #05070a; --card-bg: #0d1117; --text: #e6edf3; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--main-bg); color: var(--text); overflow-x: hidden; }
        
        /* العلامة المائية المتحركة */
        #floating-watermark { 
            position: fixed; pointer-events: none; z-index: 99999; display: none;
            color: rgba(255,255,255,0.1); font-size: 13px; background: rgba(0,0,0,0.2); 
            padding: 5px 10px; border-radius: 15px; transition: 1.5s ease-in-out; 
        }

        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;">

    <div id="floating-watermark"></div>

    <div id="login-gate" style="position:fixed; inset:0; background:var(--main-bg); z-index:100000; display:flex; align-items:center; justify-content:center;">
        <div class="gate-box" style="width:90%; max-width:400px; padding:30px; background:var(--card-bg); border-radius:25px; text-align:center; border:1px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
            <div class="logo-master-container">
                <div class="logo-main-name" style="font-size:35px; font-weight:900;">KAREEM<span style="color:var(--accent)">👑</span></div>
                <div style="color:var(--accent); letter-spacing:4px; font-weight:bold;">ACADEMY 2026</div>
            </div>

            <div id="step-1" style="margin-top:30px;">
                <input type="tel" id="std-phone" placeholder="أدخل رقم الموبايل" maxlength="11" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #333; background:#000; color:#fff; text-align:center; font-size:18px;">
                <button class="btn-accent" onclick="identifyStudent()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">استمرار <i class="fas fa-arrow-left"></i></button>
            </div>

            <div id="step-login" style="display:none; margin-top:20px;">
                <p id="welcome-back" style="color:var(--accent); margin-bottom:15px;"></p>
                <input type="password" id="std-pass" placeholder="كلمة المرور" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #333; background:#000; color:#fff; text-align:center;">
                <button class="btn-accent" onclick="verifyPassword()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">دخول للمنصة</button>
            </div>

            <div id="step-register" style="display:none; margin-top:20px;">
                <p style="font-size:13px; color:#888;">رقمك غير مسجل، أنشئ حسابك الآن:</p>
                <input type="text" id="reg-name" placeholder="الاسم الثلاثي" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:#000; color:#fff; border:1px solid #333;">
                <input type="password" id="reg-pass" placeholder="اختر كلمة مرور" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; background:#000; color:#fff; border:1px solid #333;">
                <button class="btn-accent" onclick="completeRegistration()" style="width:100%; padding:12px; background:#00c851; border:none; border-radius:10px; color:#fff; font-weight:bold;">إنشاء حساب</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" style="display:none;">
        <div style="padding:20px; text-align:center;">
            <div class="logo-main-name" style="font-size:22px;">KAREEM<span style="color:var(--accent)">👑</span></div>
        </div>
        <div class="nav-link active" onclick="tab(this, 'p-home')"><i class="fas fa-home"></i> <span>الرئيسية</span></div>
        <div class="nav-link" onclick="tab(this, 'p-lessons')"><i class="fas fa-play-circle"></i> <span>المحاضرات</span></div>
        <div class="nav-link" onclick="tab(this, 'p-files')"><i class="fas fa-file-pdf"></i> <span>المذكرات</span></div>
        <div class="nav-link" onclick="tab(this, 'p-chat')"><i class="fas fa-comments"></i> <span>الدردشة</span></div>
        
        <div id="adm-links" style="display:none; border-top:1px solid #333; margin-top:20px;">
            <div class="nav-link" style="color:#00c851;" onclick="tab(this, 'p-students')"><i class="fas fa-users-cog"></i> <span>الرادار</span></div>
            <div class="nav-link" style="color:#00c851;" onclick="tab(this, 'p-admin')"><i class="fas fa-plus-circle"></i> <span>الإدارة</span></div>
        </div>
    </aside>

    <main id="content" style="display:none; padding:20px; padding-top:80px;">
        <div id="p-home" class="page active">
            <h2>مرحباً، <span id="display-name" style="color:var(--accent)">يا بطل</span> 👋</h2>
            <div id="news-bar" class="news-ticker" style="margin-bottom:20px;"><div class="ticker-text" id="ticker-content">تحميل الأخبار...</div></div>
            <h4>📌 المحتوى المثبت</h4>
            <div id="pinned-content" class="content-grid"></div>
            <h4 style="margin-top:30px;">🆕 أحدث الدروس</h4>
            <div id="latest-content"></div>
        </div>

        <div id="p-lessons" class="page">
            <h3>المحاضرات المصورة 🎥</h3>
            <div id="video-list" class="content-grid"></div>
        </div>

        <div id="p-chat" class="page">
            <h3>دردشة الطلاب 💬</h3>
            <div class="card">
                <div id="chat-messages" style="height:400px; overflow-y:auto; padding:15px; background:rgba(0,0,0,0.3); border-radius:15px; margin-bottom:10px;"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chat-input" placeholder="اكتب رسالتك..." style="flex:1; padding:12px; border-radius:10px; background:#161b22; color:#fff; border:1px solid #333;">
                    <button class="btn-accent" style="width:60px;" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="video-player-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:200000; align-items:center; justify-content:center; flex-direction:column;">
        <button onclick="closeVideo()" style="position:absolute; top:20px; right:20px; background:red; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">إغلاق ×</button>
        <div id="video-frame-container" style="width:95%; max-width:900px; aspect-ratio:16/9;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            authDomain: "kimo-academy-48541.firebaseapp.com",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            storageBucket: "kimo-academy-48541.appspot.com",
            messagingSenderId: "385013785557",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const studentsRef = database.ref('students'), lessonsRef = database.ref('lessons'), chatRef = database.ref('chat');

        let currentUser = null;

        async function identifyStudent() {
            const phone = document.getElementById('std-phone').value.trim();
            if (!/^01[0125][0-9]{8}$/.test(phone)) return alert("رقم موبايل غير صحيح");
            
            const snapshot = await studentsRef.child(phone).once('value');
            const student = snapshot.val();
            
            document.getElementById('step-1').style.display = 'none';
            if (student && student.password) {
                currentUser = student;
                document.getElementById('step-login').style.display = 'block';
                document.getElementById('welcome-back').innerText = `أهلاً بك يا ${student.name.split(' ')[0]}`;
            } else {
                document.getElementById('step-register').style.display = 'block';
            }
        }

        function verifyPassword() {
            const pass = document.getElementById('std-pass').value;
            if (pass === currentUser.password) {
                localStorage.setItem('kimo_auth_v26', JSON.stringify(currentUser));
                runApp();
            } else alert("كلمة المرور خطأ!");
        }

        function completeRegistration() {
            const name = document.getElementById('reg-name').value, pass = document.getElementById('reg-pass').value, phone = document.getElementById('std-phone').value;
            if(name.length < 5 || pass.length < 4) return alert("بيانات ناقصة");
            const data = { name, phone, password: pass };
            studentsRef.child(phone).set(data);
            localStorage.setItem('kimo_auth_v26', JSON.stringify(data));
            runApp();
        }

        function runApp() {
            const user = JSON.parse(localStorage.getItem('kimo_auth_v26'));
            if(!user) return;
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('content').style.display = 'block';
            document.getElementById('display-name').innerText = user.name;
            if(user.phone === "01023175098") document.getElementById('adm-links').style.display = 'block';
            
            loadContent();
            startWatermark(user);
        }

        function loadContent() {
            lessonsRef.on('value', s => {
                const data = s.val() || {};
                let html = "";
                for(let id in data) {
                    html += `<div class="card">
                        <div class="lesson-thumb" style="background-image:url('https://img.youtube.com/vi/${data[id].url.split('/').pop()}/mqdefault.jpg')"></div>
                        <h5>${data[id].title}</h5>
                        <button class="btn-accent" onclick="openVideo('${data[id].url}')">مشاهدة</button>
                    </div>`;
                }
                document.getElementById('latest-content').innerHTML = html;
            });
        }

        function openVideo(url) {
            const id = url.split('/').pop();
            document.getElementById('video-frame-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('video-player-overlay').style.display = 'flex';
        }

        function closeVideo() {
            document.getElementById('video-player-overlay').style.display = 'none';
            document.getElementById('video-frame-container').innerHTML = '';
        }

        function startWatermark(user) {
            const wm = document.getElementById('floating-watermark');
            wm.style.display = 'block';
            setInterval(() => {
                wm.innerText = `${user.name} - ${user.phone}`;
                wm.style.top = Math.random() * 80 + 'vh';
                wm.style.left = Math.random() * 70 + 'vw';
            }, 4000);
        }

        function tab(el, id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        window.onload = () => { if(localStorage.getItem('kimo_auth_v26')) runApp(); };
    </script>
</body>
</html>
