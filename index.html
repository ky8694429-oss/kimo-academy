<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاضراتي | المنصة التعليمية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark: #0d1117; --glass: rgba(22, 27, 34, 0.95); --gold: #ffd700; --blue: #58a6ff; }
        body { background-color: var(--dark); color: #c9d1d9; font-family: 'Cairo', sans-serif; user-select: none; }
        .sidebar { background: var(--glass); height: 100vh; border-left: 1px solid #30363d; position: fixed; width: 260px; padding: 20px; }
        .main-content { margin-right: 260px; padding: 30px; }
        .card { background: var(--glass); border: 1px solid #30363d; border-radius: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--blue); }
        .watermark { position: absolute; pointer-events: none; color: rgba(255,255,255,0.15); font-weight: bold; font-size: 20px; z-index: 1000; transition: 1s; }
        #video-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .admin-section { display: none; background: #000; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="sidebar d-none d-md-block">
    <h3 class="text-white mb-4"><i class="fas fa-graduation-cap"></i> محاضراتي</h3>
    <div class="nav flex-column">
        <button class="btn btn-outline-primary mb-2 text-start" onclick="showSection('dashboard')"><i class="fas fa-th"></i> الرئيسة</button>
        <button class="btn btn-outline-warning text-start" onclick="showAdmin()"><i class="fas fa-cogs"></i> لوحة التحكم</button>
    </div>
</div>

<div class="main-content">
    <div id="dashboard">
        <h2>أهلاً بك، <span id="user-name">الطالب</span></h2>
        <div class="row mt-4" id="courses-grid"></div>
    </div>

    <div id="admin-sec" class="admin-section">
        <button class="btn btn-danger" onclick="showSection('dashboard')">إغلاق</button>
        <h3 class="text-warning">لوحة الإدارة الاحترافية</h3>
        <div class="row">
            <div class="col-md-6">
                <input type="text" id="add-course-name" class="form-control" placeholder="اسم الكورس الجديد">
                <button class="btn btn-success mt-2" onclick="addCourse()">إضافة كورس</button>
            </div>
            <div class="col-md-6">
                <select id="course-select" class="form-select"></select>
                <input type="text" id="lec-title" class="form-control mt-2" placeholder="عنوان المحاضرة">
                <input type="text" id="lec-url" class="form-control mt-2" placeholder="رابط الفيديو">
                <button class="btn btn-warning mt-2" onclick="addLecture()">نشر المحاضرة</button>
            </div>
        </div>
    </div>
</div>

<div id="video-modal">
    <button class="btn btn-danger position-absolute top-0 end-0 m-3" onclick="closeVideo()"><i class="fas fa-times"></i></button>
    <div id="watermark" class="watermark"></div>
    <div id="player-wrapper" style="width: 80%; height: 70vh;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script>
    const db = firebase.database();
    firebase.initializeApp({ databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com" });

    // تشغيل الحماية (الووتر مارك)
    function moveWatermark() {
        const wm = document.getElementById('watermark');
        wm.style.top = Math.random() * 80 + '%';
        wm.style.left = Math.random() * 80 + '%';
    }

    function playVideo(url) {
        const wm = document.getElementById('watermark');
        wm.innerText = localStorage.getItem('userName') || "Mohadraty System";
        setInterval(moveWatermark, 3000);
        document.getElementById('video-modal').style.display = 'flex';
        document.getElementById('player-wrapper').innerHTML = `<iframe width="100%" height="100%" src="${url}" allowfullscreen></iframe>`;
    }

    function closeVideo() { 
        document.getElementById('video-modal').style.display = 'none'; 
        document.getElementById('player-wrapper').innerHTML = ''; 
    }

    function addCourse() {
        const name = document.getElementById('add-course-name').value;
        db.ref('courses').push({ name });
        alert("تم إضافة الكورس!");
    }

    function addLecture() {
        const cid = document.getElementById('course-select').value;
        const title = document.getElementById('lec-title').value;
        const url = document.getElementById('lec-url').value;
        db.ref('lectures/'+cid).push({ title, url });
        alert("تم رفع المحاضرة!");
    }

    // تهيئة الصفحة
    function showSection(id) {
        document.getElementById('admin-sec').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    function showAdmin() {
        if(prompt("كلمة مرور الإدارة:") === "admin2026##") {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('admin-sec').style.display = 'block';
        }
    }

    // جلب البيانات (عرض)
    db.ref('courses').on('value', snap => {
        const grid = document.getElementById('courses-grid');
        const select = document.getElementById('course-select');
        grid.innerHTML = ''; select.innerHTML = '';
        snap.forEach(c => {
            grid.innerHTML += `<div class="col-md-4 mb-3"><div class="card p-4"><h4>${c.val().name}</h4><button class="btn btn-primary" onclick="showLecs('${c.key}')">عرض المحاضرات</button></div></div>`;
            select.innerHTML += `<option value="${c.key}">${c.val().name}</option>`;
        });
    });

    function showLecs(cid) {
        db.ref('lectures/'+cid).on('value', snap => {
            const grid = document.getElementById('courses-grid');
            grid.innerHTML = '<button class="btn btn-secondary" onclick="location.reload()">رجوع</button>';
            snap.forEach(l => {
                grid.innerHTML += `<div class="col-md-4 mb-3"><div class="card p-3"><h5>${l.val().title}</h5><button class="btn btn-info" onclick="playVideo('${l.val().url}')">تشغيل</button></div></div>`;
            });
        });
    }
</script>
</body>
</html>
