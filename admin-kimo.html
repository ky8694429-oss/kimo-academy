<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم أكاديمية كيمو</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        h2 { color: #ffc107; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>مدير الأكاديمية 🎓</h2>
    <input type="text" id="notif-title" placeholder="عنوان الإشعار">
    <textarea id="notif-body" placeholder="نص الرسالة"></textarea>
    <button id="send-btn" onclick="sendPush()">إرسال الإشعار الآن 🚀</button>
</div>

<script>
async function sendPush() {
    const title = document.getElementById('notif-title').value;
    const body = document.getElementById('notif-body').value;
    const btn = document.getElementById('send-btn');
    
    if(!title || !body) { alert("اكتب البيانات يا كيمو!"); return; }

    btn.innerText = "جاري الإرسال...";
    btn.disabled = true;

    try {
        const response = await fetch("https://onesignal.com/api/v1/notifications", {
            method: "POST",
            headers: {
                "Content-Type": "application/json; charset=utf-8",
                "Authorization": "Basic NWZlYzdmNWYtNmM0Ny00YzBmLTkzYmEtN2U2ZDIxODllMWI1"
            },
            body: JSON.stringify({
                app_id: "7e6da62d-7c47-4c0f-93ba-7e6d2189e1b5",
                included_segments: ["Total Subscriptions"],
                headings: {"en": title},
                contents: {"en": body}
            })
        });

        const data = await response.json();
        btn.disabled = false;
        btn.innerText = "إرسال الإشعار الآن 🚀";

        if (response.ok) {
            alert("عاش يا كيمو! الإشعار وصل لـ " + (data.recipients || 0) + " طالب ✅");
        } else {
            alert("OneSignal قال فيه غلط: " + (data.errors ? data.errors[0] : "غلط غير معروف"));
        }
    } catch (error) {
        btn.disabled = false;
        btn.innerText = "إرسال الإشعار الآن 🚀";
        alert("خطأ في الاتصال.. تأكد إن النت شغال أو إن الـ API Key صح!");
    }
}
</script>
</body>
</html>
