<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>KIMO ACADEMY | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-bg: #05070a; --card-bg: #0d1117; --accent: #00d4ff; --green: #00c851; --text: #e6edf3; --whatsapp: #25d366; --danger: #ff4d4d; }
        
        body { margin: 0; background: linear-gradient(-45deg, #05070a, #0a192f, #0d1117, #05070a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; min-height: 100vh; position: relative; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        aside { width: 280px; background: rgba(1, 4, 9, 0.95); backdrop-filter: blur(10px); border-left: 1px solid #30363d; display: none; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 999; }
        .nav-link { padding: 18px 25px; cursor: pointer; color: #8b949e; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-right: 4px solid transparent; font-size: 18px; }
        .nav-link:hover, .nav-link.active { color: var(--accent); background: rgba(0, 212, 255, 0.05); border-right-color: var(--accent); }

        main { flex: 1; padding: 30px; display: none; padding-bottom: 120px; overflow-y: auto; }
        .page { display: none; animation: fadeIn 0.5s ease-out; }
        .page.active { display: block; }
        
        .support-cloud { position: fixed; bottom: 80px; right: 20px; background: var(--whatsapp); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); cursor: pointer; z-index: 9999; animation: pulse 2s infinite; text-decoration: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        #floating-watermark { position: fixed; background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 20000; display: none; transition: 1s; white-space: nowrap; }
        
        #login-gate { position: fixed; inset: 0; background: var(--main-bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-box { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 380px; text-align: center; }
        
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .subject-card { background: linear-gradient(145deg, #0d1117, #161b22); border: 1px solid #30363d; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .subject-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .subject-card i { font-size: 45px; color: var(--accent); margin-bottom: 15px; }

        .card { background: rgba(13, 17, 23, 0.8); border-radius: 15px; padding: 20px; border: 1px solid #30363d; text-align: center; position: relative; }
        .btn-play { background: rgba(0, 212, 255, 0.1); color: var(--accent); width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        
        /* زر الحذف */
        .btn-delete { position: absolute; top: 10px; left: 10px; background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); border-radius: 5px; padding: 5px 8px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .btn-delete:hover { background: var(--danger); color: white; }

        #video-player-overlay { position: fixed; inset: 0; background: #000; z-index: 15000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .video-container { width: 95%; max-width: 1000px; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn-accent { background: var(--accent); color: #000; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 17px; }
        
        footer { position: fixed; bottom: 0; width: 100%; background: #010409; color: #fff; text-align: center; padding: 15px 0; font-size: 13px; border-top: 2px solid var(--accent); z-index: 1000; }

        @media (max-width: 768px) {
            aside { width: 70px; }
            aside .nav-link span { display: none; }
            main { padding: 15px; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <a href="https://wa.me/201023175098" target="_blank" class="support-cloud" id="support-btn" style="display: none;"><i class="fab fa-whatsapp"></i></a>

    <div id="video-player-overlay">
        <div style="width: 95%; max-width: 1000px; display: flex; justify-content: space-between; margin-bottom: 15px;">
            <div id="timer-display" style="background:var(--accent); color:#000; padding:8px 20px; border-radius:25px; font-weight:bold;">00:00</div>
            <button class="btn-accent" style="width: auto; padding: 5px 20px;" onclick="closeVideo()">إغلاق ×</button>
        </div>
        <div class="video-container" id="video-frame-container"></div>
    </div>

    <div id="login-gate">
        <div class="gate-box">
            <h1 style="color:var(--accent); margin-bottom: 20px;">
                <i class="fas fa-graduation-cap"></i> KIMO ACADEMY
            </h1>
            <input type="text" id="std-name" placeholder="الاسم الرباعي">
            <input type="tel" id="std-phone" placeholder="رقم الموبايل">
            <button class="btn-accent" onclick="checkGate()">دخول المنصة 🚀</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 30px; font-size: 20px; font-weight: bold; color: var(--accent); text-align: center; border-bottom: 1px solid #333;">KIMO ACADEMY</div>
        <div class="nav-link active" onclick="tab(this, 'p-home')"><i class="fas fa-home"></i> <span>الرئيسية</span></div>
        <div class="nav-link" onclick="tab(this, 'p-lessons')"><i class="fas fa-play-circle"></i> <span>المحاضرات</span></div>
        <div class="nav-link" onclick="tab(this, 'p-files')"><i class="fas fa-file-pdf"></i> <span>الملازم</span></div>
        <div id="adm-links" style="display:none; border-top:1px solid #333; margin-top:15px; padding-top:15px;">
            <div class="nav-link" style="color:var(--green)" onclick="tab(this, 'p-students')"><i class="fas fa-users-cog"></i> <span>الطلاب</span></div>
            <div class="nav-link" style="color:var(--green)" onclick="tab(this, 'p-admin')"><i class="fas fa-tools"></i> <span>الإدارة</span></div>
        </div>
        <div class="nav-link" style="margin-top:auto; color:#ff4d4d; border-top: 1px solid #333;" onclick="logout()"><i class="fas fa-power-off"></i> <span>خروج</span></div>
    </aside>

    <main id="content">
        <div id="p-home" class="page active">
            <h1>أهلاً بك، <span id="display-name" style="color:var(--accent)"></span> 🔥</h1>
            <div id="latest-content"></div>
        </div>

        <div id="p-lessons" class="page">
            <div id="subjects-container-video">
                <h2>المحاضرات: اختر المادة</h2>
                <div class="content-grid" id="subjects-grid-video"></div>
            </div>
            <div id="specific-subject-videos" style="display:none;">
                <button onclick="showSubjects('video')">العودة</button>
                <h2 id="current-video-subject-title"></h2>
                <div class="content-grid" id="video-list"></div>
            </div>
        </div>

        <div id="p-files" class="page">
            <div id="subjects-container-file">
                <h2>الملازم: اختر المادة</h2>
                <div class="content-grid" id="subjects-grid-file"></div>
            </div>
            <div id="specific-subject-files" style="display:none;">
                <button onclick="showSubjects('file')">العودة</button>
                <h2 id="current-file-subject-title"></h2>
                <div class="content-grid" id="file-list"></div>
            </div>
        </div>

        <div id="p-students" class="page">
            <h2>قائمة الطلاب المسجلين 👥</h2>
            <div id="students-table-container">
                <table style="width:100%; border-collapse: collapse; text-align: right;">
                    <thead><tr style="border-bottom:1px solid #333"><th>الاسم</th><th>الموبايل</th><th>التاريخ</th></tr></thead>
                    <tbody id="students-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="p-admin" class="page">
            <div id="admin-subjects-selection">
                <h2>🚀 رفع محتوى جديد</h2>
                <div class="content-grid" id="admin-subjects-grid"></div>
            </div>
            <div id="admin-upload-form" style="display:none;">
                <button onclick="showAdminSubjects()">العودة</button>
                <div class="card" style="max-width: 500px; margin: auto;">
                    <p>إضافة لمادة: <b id="current-adm-sub-name"></b></p>
                    <input type="text" id="adm-title" placeholder="عنوان الدرس">
                    <input type="text" id="adm-url" placeholder="الرابط">
                    <select id="adm-type">
                        <option value="video">فيديو 🎥</option>
                        <option value="file">ملزمة 📄</option>
                    </select>
                    <button class="btn-accent" onclick="secureUpload()">نشر الآن ✅</button>
                </div>
            </div>
        </div>
    </main>

    <footer>جميع الحقوق محفوظة للمطور <b>كريم محمود</b> © 2026</footer>
    <div id="floating-watermark"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            authDomain: "kimo-academy-48541.firebaseapp.com",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            storageBucket: "kimo-academy-48541.firebasestorage.app",
            messagingSenderId: "385013785557",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const lessonsRef = database.ref('lessons');
        const studentsRef = database.ref('students');
        let allData = {}, timerInterval, watermarkInterval, seconds = 0;
        let selectedAdminSubject = "";

        const subjects = [
            { name: "اللغة العربية", icon: "fa-book" }, { name: "اللغة الإنجليزية", icon: "fa-language" },
            { name: "الفيزياء", icon: "fa-atom" }, { name: "الكيمياء", icon: "fa-flask" },
            { name: "الأحياء", icon: "fa-dna" }, { name: "الرياضيات", icon: "fa-calculator" }, { name: "أخرى", icon: "fa-star" }
        ];

        function checkGate() {
            const name = document.getElementById('std-name').value;
            const phone = document.getElementById('std-phone').value;
            if (name.trim().length > 5 && phone.length >= 11) {
                const studentData = { name, phone, loginTime: new Date().toLocaleString('ar-EG') };
                studentsRef.push(studentData);
                localStorage.setItem('kimo_auth_v25', JSON.stringify(studentData));
                runApp();
            } else { alert("بيانات غير صحيحة!"); }
        }

        function runApp() {
            const data = JSON.parse(localStorage.getItem('kimo_auth_v25'));
            if(!data) return;
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('content').style.display = 'block';
            document.getElementById('support-btn').style.display = 'flex';
            document.getElementById('display-name').innerText = data.name.split(' ')[0];
            if (data.phone === "01023175098") document.getElementById('adm-links').style.display = 'block';
            loadData();
            loadStudents();
            renderAdminSubjects();
        }

        function loadData() {
            lessonsRef.on('value', (snap) => {
                allData = snap.val() || {};
                renderSubjectGrids();
                renderLatest();
            });
        }

        function renderContentList(sub, type, container) {
            let html = "";
            const isAdmin = JSON.parse(localStorage.getItem('kimo_auth_v25')).phone === "01023175098";
            for (let id in allData) {
                const item = allData[id];
                if (item.subject === sub && item.type === type) {
                    html += `
                    <div class="card">
                        ${isAdmin ? `<button class="btn-delete" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i> حذف</button>` : ''}
                        <h3>${item.title}</h3>
                        <button class="btn-play" onclick="openContent('${item.url}','${item.type}')">فتح</button>
                    </div>`;
                }
            }
            document.getElementById(container).innerHTML = html || "<p>لا يوجد محتوى.</p>";
        }

        function deleteItem(id) {
            if(confirm("هل أنت متأكد من حذف هذا المحتوى نهائياً؟")) {
                lessonsRef.child(id).remove().then(() => alert("تم الحذف بنجاح"));
            }
        }

        function renderLatest() {
            let items = Object.entries(allData).reverse().slice(0, 4);
            const isAdmin = JSON.parse(localStorage.getItem('kimo_auth_v25'))?.phone === "01023175098";
            let html = items.map(([id, i]) => `
                <div class="card">
                    ${isAdmin ? `<button class="btn-delete" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i></button>` : ''}
                    <small>${i.subject}</small>
                    <h4>${i.title}</h4>
                    <button class="btn-play" onclick="openContent('${i.url}','${i.type}')">فتح</button>
                </div>
            `).join('');
            document.getElementById('latest-content').innerHTML = `<h3>آخر الإضافات 🔥</h3><div class="content-grid">${html}</div>`;
        }

        // بقية الدوال (openContent, tab, logout, etc.) كما هي في الكود السابق
        function openContent(url, type) {
            if (type === 'video') {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
                const match = url.match(regExp);
                const videoId = (match && match[2].length === 11) ? match[2] : null;
                if(!videoId) return alert("رابط فيديو غير صالح!");
                document.getElementById('video-frame-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allowfullscreen width="100%" height="100%"></iframe>`;
                document.getElementById('video-player-overlay').style.display = 'flex';
                startVideoTools();
            } else { window.open(url, '_blank'); }
        }

        function startVideoTools() {
            seconds = 0; clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++; let m = Math.floor(seconds / 60), s = seconds % 60;
                document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
            watermarkInterval = setInterval(moveWatermark, 5000); moveWatermark();
        }

        function moveWatermark() {
            const wm = document.getElementById('floating-watermark'), data = JSON.parse(localStorage.getItem('kimo_auth_v25'));
            if(data) {
                wm.innerText = `${data.name} | ${data.phone}`; wm.style.display = 'block';
                wm.style.left = Math.random() * (window.innerWidth - 150) + 'px';
                wm.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            }
        }

        function closeVideo() { 
            document.getElementById('video-player-overlay').style.display = 'none'; 
            document.getElementById('video-frame-container').innerHTML = ""; 
            clearInterval(timerInterval); clearInterval(watermarkInterval);
            document.getElementById('floating-watermark').style.display = 'none';
        }

        function secureUpload() {
            const title = document.getElementById('adm-title').value;
            const url = document.getElementById('adm-url').value;
            const type = document.getElementById('adm-type').value;
            if(title && url && selectedAdminSubject) {
                lessonsRef.push({ title, url, subject: selectedAdminSubject, type }).then(() => {
                    alert("تم النشر!");
                    showAdminSubjects();
                });
            }
        }

        function loadStudents() {
            studentsRef.on('value', (snap) => {
                const data = snap.val(); let rows = "";
                for (let id in data) rows = `<tr><td>${data[id].name}</td><td>${data[id].phone}</td><td>${data[id].loginTime}</td></tr>` + rows;
                document.getElementById('students-table-body').innerHTML = rows;
            });
        }

        function renderSubjectGrids() {
            let vHtml = "", fHtml = "";
            subjects.forEach(s => {
                vHtml += `<div class="subject-card" onclick="openSubject('${s.name}', 'video')"><i class="fas ${s.icon}"></i><h3>${s.name}</h3></div>`;
                fHtml += `<div class="subject-card" onclick="openSubject('${s.name}', 'file')"><i class="fas ${s.icon}"></i><h3>${s.name}</h3></div>`;
            });
            document.getElementById('subjects-grid-video').innerHTML = vHtml;
            document.getElementById('subjects-grid-file').innerHTML = fHtml;
        }

        function renderAdminSubjects() {
            let html = "";
            subjects.forEach(s => html += `<div class="subject-card" onclick="initiateUpload('${s.name}')"><i class="fas ${s.icon}"></i><h3>${s.name}</h3></div>`);
            document.getElementById('admin-subjects-grid').innerHTML = html;
        }

        function openSubject(name, type) {
            const containerId = type === 'video' ? 'subjects-container-video' : 'subjects-container-file';
            const specificId = type === 'video' ? 'specific-subject-videos' : 'specific-subject-files';
            const titleId = type === 'video' ? 'current-video-subject-title' : 'current-file-subject-title';
            const listId = type === 'video' ? 'video-list' : 'file-list';
            document.getElementById(containerId).style.display = 'none';
            document.getElementById(specificId).style.display = 'block';
            document.getElementById(titleId).innerText = name;
            renderContentList(name, type, listId);
        }

        function showSubjects(type) {
            document.getElementById(type === 'video' ? 'subjects-container-video' : 'subjects-container-file').style.display = 'block';
            document.getElementById(type === 'video' ? 'specific-subject-videos' : 'specific-subject-files').style.display = 'none';
        }

        function initiateUpload(sub) {
            selectedAdminSubject = sub;
            document.getElementById('admin-subjects-selection').style.display = 'none';
            document.getElementById('admin-upload-form').style.display = 'block';
            document.getElementById('current-adm-sub-name').innerText = sub;
        }

        function showAdminSubjects() {
            document.getElementById('admin-subjects-selection').style.display = 'block';
            document.getElementById('admin-upload-form').style.display = 'none';
        }

        function logout() { localStorage.removeItem('kimo_auth_v25'); location.reload(); }
        function tab(el, id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        window.onload = () => { if (localStorage.getItem('kimo_auth_v25')) runApp(); };
    </script>
</body>
</html>
