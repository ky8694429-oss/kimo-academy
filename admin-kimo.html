<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم كيمو</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-box { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="admin-box">
    <h2>مدير الأكاديمية 🎓</h2>
    <input type="text" id="notif-title" placeholder="العنوان">
    <textarea id="notif-body" placeholder="الرسالة"></textarea>
    <button id="send-btn" onclick="sendPush()">إرسال الإشعار 🚀</button>
</div>

<script>
async function sendPush() {
    const title = document.getElementById('notif-title').value;
    const body = document.getElementById('notif-body').value;
    const btn = document.getElementById('send-btn');
    if(!title || !body) return;

    btn.innerText = "جاري المحاولة...";
    btn.disabled = true;

    const APP_ID = "7e6da62d-7c47-4c0f-93ba-7e6d2189e1b5";
    // المفتاح الجديد
    const NEW_KEY = "os_v2_app_pzw2mll4i5ga7e52pzwsdcpbwxzf5yyxo64ukp4zyxh445oxqiaw5ym3fuoq4lrvmwvm2w5vbyix4moj6pnzuugy4lxudro6zbyl3oq";
    // المفتاح القديم
    const OLD_KEY = "NWZlYzdmNWYtNmM0Ny00YzBmLTkzYmEtN2U2ZDIxODllMWI1";

    const proxyUrl = "https://cors-anywhere.herokuapp.com/";
    const apiUrl = "https://onesignal.com/api/v1/notifications";

    try {
        // محاولة أولى بالمفتاح الجديد
        let response = await fetch(proxyUrl + apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Key " + NEW_KEY
            },
            body: JSON.stringify({
                app_id: APP_ID,
                included_segments: ["Total Subscriptions"],
                headings: {"en": title},
                contents: {"en": body}
            })
        });

        if (!response.ok) {
            // لو فشل، جرب بالمفتاح القديم فوراً
            response = await fetch(proxyUrl + apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Basic " + OLD_KEY
                },
                body: JSON.stringify({
                    app_id: APP_ID,
                    included_segments: ["Total Subscriptions"],
                    headings: {"en": title},
                    contents: {"en": body}
                })
            });
        }

        const data = await response.json();
        btn.disabled = false;
        btn.innerText = "إرسال الإشعار 🚀";

        if (response.ok) {
            alert("✅ أخيراً اشتغلت يا كيمو! الإشعار اتبعت.");
        } else {
            alert("❌ لسه فيه مشكلة في مفاتيح OneSignal نفسه.");
        }
    } catch (error) {
        btn.disabled = false;
        window.open("https://cors-anywhere.herokuapp.com/corsdemo", "_blank");
    }
}
</script>
</body>
</html>
