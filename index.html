<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohadraty Pro System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #0d6efd; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .card { background-color: var(--card); border: 1px solid #30363d; border-radius: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
        .btn-custom { border-radius: 8px; font-weight: bold; }
        .admin-panel { border: 2px dashed #ffd700; padding: 20px; border-radius: 15px; }
        iframe { width: 100%; height: 400px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <section id="login" class="view active container mt-5">
        <div class="card p-5 mx-auto" style="max-width: 400px;">
            <h2 class="text-center mb-4"><i class="fas fa-user-lock"></i> دخول المنصة</h2>
            <input type="text" id="stuName" class="form-control mb-3" placeholder="اسم الطالب">
            <input type="password" id="passKey" class="form-control mb-3" placeholder="كود الدخول">
            <button class="btn btn-primary w-100" onclick="auth.login()">دخول</button>
        </div>
    </section>

    <section id="dashboard" class="view container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h1>مرحباً بك يا <span id="userNameDisplay"></span></h1>
            <button class="btn btn-outline-danger" onclick="location.reload()">خروج</button>
        </div>
        
        <div id="admin-area" class="admin-panel mb-4" style="display:none;">
            <h3>لوحة الإدارة</h3>
            <div class="row">
                <div class="col-md-4">
                    <input type="text" id="new-course" class="form-control mb-2" placeholder="اسم القسم الجديد">
                    <button class="btn btn-success" onclick="dbOps.addCourse()">إضافة قسم</button>
                </div>
                <div class="col-md-8">
                    <select id="course-select" class="form-select mb-2"></select>
                    <input type="text" id="lec-title" class="form-control mb-2" placeholder="عنوان المحاضرة">
                    <textarea id="lec-vids" class="form-control mb-2" placeholder="روابط الفيديوهات (رابط لكل سطر)"></textarea>
                    <input type="text" id="lec-pdf" class="form-control mb-2" placeholder="رابط PDF">
                    <button class="btn btn-warning" onclick="dbOps.addLecture()">رفع المحاضرة</button>
                </div>
            </div>
        </div>

        <div id="course-grid" class="row g-4"></div>
    </section>

    <section id="content-view" class="view container mt-5">
        <button class="btn btn-outline-light mb-4" onclick="nav('dashboard')">← عودة للرئيسية</button>
        <div id="lecture-data"></div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({ databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com" });
        const db = firebase.database();

        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const auth = {
            login: () => {
                const pass = document.getElementById('passKey').value;
                const name = document.getElementById('stuName').value;
                if(pass.includes('#') || pass === "admin123") {
                    document.getElementById('userNameDisplay').innerText = name;
                    if(pass === "admin123") document.getElementById('admin-area').style.display = 'block';
                    nav('dashboard');
                    dbOps.fetchData();
                } else alert("كود خطأ");
            }
        };

        const dbOps = {
            addCourse: () => {
                db.ref('courses').push({ name: document.getElementById('new-course').value });
                alert("تم");
            },
            addLecture: () => {
                const cid = document.getElementById('course-select').value;
                const vids = document.getElementById('lec-vids').value.split('\n');
                db.ref('lectures/'+cid).push({ title: document.getElementById('lec-title').value, vids, pdf: document.getElementById('lec-pdf').value });
                alert("تم الرفع");
            },
            fetchData: () => {
                db.ref('courses').on('value', snap => {
                    const grid = document.getElementById('course-grid');
                    const sel = document.getElementById('course-select');
                    grid.innerHTML = ''; sel.innerHTML = '';
                    snap.forEach(c => {
                        grid.innerHTML += `<div class="col-md-4"><div class="card p-4"><h3>${c.val().name}</h3><button class="btn btn-primary" onclick="dbOps.showLecs('${c.key}')">عرض المحاضرات</button></div></div>`;
                        sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`;
                    });
                });
            },
            showLecs: (cid) => {
                db.ref('lectures/'+cid).on('value', snap => {
                    const cont = document.getElementById('lecture-data');
                    cont.innerHTML = '';
                    snap.forEach(l => {
                        let vids = l.val().vids.map(v => `<iframe src="${v}" allowfullscreen></iframe>`).join('');
                        cont.innerHTML += `<div class="card p-4 mb-3"><h3>${l.val().title}</h3>${vids}<a href="${l.val().pdf}" class="btn btn-success" target="_blank">تحميل ملف PDF</a></div>`;
                    });
                    nav('content-view');
                });
            }
        };
    </script>
</body>
</html>
