<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO ACADEMY | 2026</title>
    <link rel="stylesheet" href="https://ky8694429-oss.github.io/kimo-academy/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body style="background: #05070a; color: white; font-family: sans-serif; text-align: center;">

    <div id="login-gate" style="margin-top: 100px;">
        <h1 style="color: #FF9800;">KIMO ACADEMY</h1>
        <div id="step-1">
            <input type="tel" id="std-phone" placeholder="رقم الموبايل" style="padding:15px; border-radius:10px; width:250px; border:1px solid #333; background:#000; color:#fff;">
            <br><br>
            <button id="btn-continue" style="padding:15px 40px; background:#FF9800; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">استمرار</button>
        </div>
        
        <div id="step-login" style="display:none; margin-top:20px;">
            <p id="welcome-msg"></p>
            <input type="password" id="std-pass" placeholder="كلمة المرور" style="padding:15px; border-radius:10px; width:250px;">
            <br><br>
            <button id="btn-login" style="padding:15px 40px; background:#FF9800; border:none; border-radius:10px;">دخول</button>
        </div>
    </div>

    <script>
        // إعدادات فايربيز (تأكد إنها صحيحة)
        const firebaseConfig = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            authDomain: "kimo-academy-48541.firebaseapp.com",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            storageBucket: "kimo-academy-48541.appspot.com",
            messagingSenderId: "385013785557",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        
        // بدء التشغيل
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ربط الزرار يدوياً عشان نضمن الاستجابة
        document.getElementById('btn-continue').addEventListener('click', async function() {
            const phone = document.getElementById('std-phone').value.trim();
            if (!/^01[0125][0-9]{8}$/.test(phone)) {
                alert("اكتب رقم موبايل صح يا آدم");
                return;
            }

            this.innerText = "جاري التحقق...";
            this.disabled = true;

            try {
                const snapshot = await db.ref('students/' + phone).once('value');
                const student = snapshot.val();

                if (student) {
                    document.getElementById('step-1').style.display = 'none';
                    document.getElementById('step-login').style.display = 'block';
                    document.getElementById('welcome-msg').innerText = "أهلاً يا " + student.name;
                    window.userData = student;
                } else {
                    alert("الرقم ده مش متسجل عندنا");
                    this.innerText = "استمرار";
                    this.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("في مشكلة في الاتصال بفايربيز");
                this.innerText = "استمرار";
                this.disabled = false;
            }
        });
    </script>
</body>
</html>
