<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>KIMO ACADEMY | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --main-bg: #05070a; --card-bg: #0d1117; --accent: #00d4ff; 
            --green: #00c851; --text: #e6edf3; --whatsapp: #25d366; 
            --telegram: #0088cc; --danger: #ff4d4d; --gold: #f1c40f; 
            --sidebar-bg: rgba(1, 4, 9, 0.98); --sidebar-width: 280px;
        }
        
        body.light-mode { --main-bg: #f0f2f5; --card-bg: #ffffff; --text: #1c1e21; --sidebar-bg: #ffffff; }
        body.sidebar-collapsed { --sidebar-width: 80px; }

        body { 
            margin: 0; background: linear-gradient(-45deg, var(--main-bg), #0a192f, var(--card-bg), var(--main-bg)); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; min-height: 100vh; 
            position: relative; user-select: none; overflow-x: hidden;
            font-weight: 600; /* جعل الخط العام أتخن */
        } 
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .news-banner {
            position: fixed; top: 0; left: 0; right: 0; 
            background: var(--accent); color: #000; 
            padding: 12px 50px; z-index: 10001; 
            display: none; align-items: center; justify-content: center;
            font-weight: 900; font-size: 17px; border-bottom: 3px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .news-banner .close-news {
            position: absolute; left: 20px; cursor: pointer; font-size: 20px; transition: 0.3s;
        }

        .top-tools { 
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            display: none; align-items: center; justify-content: flex-end; 
            padding: 0 20px; gap: 15px; z-index: 998; background: rgba(0,0,0,0.2); 
            backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        aside { 
            width: var(--sidebar-width); background: var(--sidebar-bg); 
            backdrop-filter: blur(15px); border-left: 1px solid #30363d; 
            display: none; flex-direction: column; position: fixed; 
            right: 0; top: 0; height: 100vh; z-index: 10000; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #333; min-width: var(--sidebar-width);
        }
        .sidebar-header b { font-size: 22px; color: var(--accent); font-weight: 900; white-space: nowrap; }

        .nav-link { 
            padding: 18px 25px; cursor: pointer; color: #8b949e; 
            display: flex; align-items: center; gap: 20px; transition: 0.3s; 
            border-right: 4px solid transparent; font-size: 19px; font-weight: 800;
            min-width: 280px;
        }
        .nav-link:hover, .nav-link.active { color: var(--accent); background: rgba(0, 212, 255, 0.08); border-right-color: var(--accent); }

        main { 
            flex: 1; padding: 30px; display: none; padding-top: 100px; 
            padding-bottom: 120px; overflow-y: auto;
            margin-right: var(--sidebar-width);
            transition: margin-right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        h1, h2, h3 { font-weight: 900; letter-spacing: -0.5px; }
        
        .support-cloud { 
            position: fixed; right: 20px; color: white; width: 60px; height: 60px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; cursor: pointer; z-index: 9999; animation: pulse 2s infinite; 
            text-decoration: none; 
        }
        #wa-btn { bottom: 30px; background: var(--whatsapp); }
        #tg-btn { bottom: 105px; background: var(--telegram); }

        #login-gate { position: fixed; inset: 0; background: var(--main-bg); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-box { background: var(--card-bg); padding: 35px; border-radius: 25px; border: 1px solid #30363d; width: 100%; max-width: 400px; text-align: center; }
        .gate-box input { font-weight: 700; }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .subject-card { 
            background: linear-gradient(145deg, var(--card-bg), #161b22); 
            border: 1px solid #30363d; border-radius: 20px; padding: 35px; 
            text-align: center; cursor: pointer; transition: 0.4s; 
        }
        .subject-card h3 { font-weight: 900; margin: 0; font-size: 22px; }

        .card { background: rgba(13, 17, 23, 0.8); border-radius: 18px; padding: 25px; border: 1px solid #30363d; text-align: center; }
        .card h4 { font-weight: 800; font-size: 18px; }

        .btn-accent { background: var(--accent); color: #000; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; width: 100%; font-size: 19px; transition: 0.3s; }

        footer { position: fixed; bottom: 0; right: 0; left: 0; background: #010409; color: #fff; text-align: center; padding: 15px 0; font-size: 14px; border-top: 2px solid var(--accent); z-index: 997; font-weight: 700; }

        @media (max-width: 768px) {
            aside { width: 0; }
            body.sidebar-collapsed aside { width: 280px; }
            main { margin-right: 0 !important; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div id="news-banner" class="news-banner">
        <i class="fas fa-times-circle close-news" onclick="this.parentElement.style.display='none'"></i>
        <span id="banner-text">📢 جارِ تحميل آخر التنبيهات...</span>
    </div>

    <div id="top-bar" class="top-tools">
        <button class="tool-btn logout-top" onclick="logout()" title="تسجيل خروج" style="border-radius: 10px; border:1px solid var(--danger); color:var(--danger); background:none; width:40px; height:40px; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <a href="https://wa.me/201023175098" target="_blank" class="support-cloud" id="wa-btn" style="display: none;"><i class="fab fa-whatsapp"></i></a>
    <a href="https://t.me/K_I_M_O_8" target="_blank" class="support-cloud" id="tg-btn" style="display: none;"><i class="fab fa-telegram-plane"></i></a>

    <div id="login-gate">
        <div class="gate-box">
            <h1 style="color:var(--accent); margin-bottom: 25px;"><i class="fas fa-graduation-cap"></i> KIMO ACADEMY</h1>
            <input type="text" id="std-name" placeholder="الاسم الرباعي" style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff;">
            <input type="tel" id="std-phone" placeholder="رقم الموبايل" style="width:100%; padding:14px; margin-bottom:20px; border-radius:10px; background:#000; border:1px solid #333; color:#fff;">
            <button class="btn-accent" onclick="checkGate()">دخول المنصة 🚀</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <b>KIMO ACADEMY</b>
            <i class="fas fa-chevron-right toggle-btn" id="collapse-icon" onclick="toggleSidebar()"></i>
        </div>
        <div class="nav-link active" onclick="tab(this, 'p-home')"><i class="fas fa-home"></i> <span>الرئيسية</span></div>
        <div class="nav-link" onclick="tab(this, 'p-lessons')"><i class="fas fa-play-circle"></i> <span>المحاضرات</span></div>
        <div class="nav-link" onclick="tab(this, 'p-files')"><i class="fas fa-file-pdf"></i> <span>الملازم</span></div>
        <div class="nav-link" onclick="tab(this, 'p-exams-list')"><i class="fas fa-edit"></i> <span>الامتحانات</span></div>
        
        <div id="adm-links" style="display:none; border-top:1px solid #333; margin-top:15px; padding-top:15px;">
            <div class="nav-link" style="color:var(--green)" onclick="tab(this, 'p-students')"><i class="fas fa-users-cog"></i> <span>الطلاب</span></div>
            <div class="nav-link" style="color:var(--green)" onclick="tab(this, 'p-admin')"><i class="fas fa-tools"></i> <span>الإدارة</span></div>
        </div>
        
        <div class="nav-link" style="margin-top:auto; color:#ff4d4d; border-top: 1px solid #333;" onclick="logout()"><i class="fas fa-power-off"></i> <span>خروج</span></div>
    </aside>

    <main id="content">
        <div id="p-home" class="page active">
            <h1>أهلاً بك، <span id="display-name" style="color:var(--accent)"></span> 🔥</h1>
            <div id="latest-content"></div>
        </div>
        
        <div id="p-lessons" class="page">
            <div id="subjects-container-video"><div class="content-grid" id="subjects-grid-video"></div></div>
            <div id="specific-subject-videos" style="display:none;"><button onclick="showSubjects('video')" class="btn-accent" style="width:auto; margin-bottom:20px; padding: 10px 25px;">العودة</button><h2 id="current-video-subject-title"></h2><div class="content-grid" id="video-list"></div></div>
        </div>
        <div id="p-files" class="page">
            <div id="subjects-container-file"><div class="content-grid" id="subjects-grid-file"></div></div>
            <div id="specific-subject-files" style="display:none;"><button onclick="showSubjects('file')" class="btn-accent" style="width:auto; margin-bottom:20px; padding: 10px 25px;">العودة</button><h2 id="current-file-subject-title"></h2><div class="content-grid" id="file-list"></div></div>
        </div>
        <div id="p-exams-list" class="page"><h2>الامتحانات المتاحة 📝</h2><div class="content-grid" id="available-exams-grid"></div></div>
        <div id="p-students" class="page"><h2>قائمة الطلاب 👥</h2><div id="students-table-body"></div></div>
        <div id="p-admin" class="page">
            <div class="card" style="margin-bottom: 25px; border-color: var(--gold);">
                <h3 style="color: var(--gold);">📢 تحديث إعلان المنصة</h3>
                <input type="text" id="adm-news-text" placeholder="اكتب الخبر العريض هنا..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; background:#000; border:1px solid #333; color:#fff; font-weight:700;">
                <button class="btn-accent" onclick="updateNewsTicker()">تحديث ونشر الإعلان 🔥</button>
            </div>
            <div id="admin-subjects-selection"><div class="content-grid" id="admin-subjects-grid"></div></div>
        </div>
    </main>

    <footer>جميع الحقوق محفوظة للمطور <b>كريم محمود</b> © 2026</footer>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzddbE_g5qsqTh7lQRDqh0Gmo28Seyr08",
            authDomain: "kimo-academy-48541.firebaseapp.com",
            databaseURL: "https://kimo-academy-48541-default-rtdb.firebaseio.com",
            projectId: "kimo-academy-48541",
            storageBucket: "kimo-academy-48541.firebasestorage.app",
            messagingSenderId: "385013785557",
            appId: "1:385013785557:web:a2e54aa4a1e1b8d187135c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const lessonsRef = database.ref('lessons'), studentsRef = database.ref('students'), settingsRef = database.ref('settings');

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-collapsed');
            const icon = document.getElementById('collapse-icon');
            icon.className = document.body.classList.contains('sidebar-collapsed') ? 'fas fa-chevron-left toggle-btn' : 'fas fa-chevron-right toggle-btn';
        }

        function checkGate() {
            const name = document.getElementById('std-name').value, phone = document.getElementById('std-phone').value;
            if (name.trim().length > 5 && phone.length >= 11) {
                const studentData = { name, phone, loginTime: new Date().toLocaleString('ar-EG') };
                studentsRef.orderByChild('phone').equalTo(phone).once('value', snap => {
                    if(!snap.exists()) studentsRef.push(studentData);
                });
                localStorage.setItem('kimo_auth_v25', JSON.stringify(studentData));
                runApp();
            } else { alert("يرجى إدخال بيانات صحيحة!"); }
        }

        function runApp() {
            const data = JSON.parse(localStorage.getItem('kimo_auth_v25'));
            if(!data) return;
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('news-banner').style.display = 'flex'; 
            document.getElementById('content').style.display = 'block';
            document.getElementById('wa-btn').style.display = 'flex';
            document.getElementById('tg-btn').style.display = 'flex';
            document.getElementById('display-name').innerText = data.name.split(' ')[0];
            if (data.phone === "01023175098") document.getElementById('adm-links').style.display = 'block';
            
            settingsRef.child('newsTicker').on('value', snap => {
                document.getElementById('banner-text').innerText = "📢 " + (snap.val() || "مرحباً بكم في كيمو أكاديمي");
            });

            loadData(); renderSubjectGrids(); renderAdminSubjects();
        }

        function updateNewsTicker() {
            const txt = document.getElementById('adm-news-text').value;
            if(txt) settingsRef.update({ newsTicker: txt }).then(() => alert("تم تحديث الإعلان!"));
        }

        let allData = {};
        function loadData() { lessonsRef.on('value', snap => { allData = snap.val() || {}; renderLatest(); }); }
        
        function renderLatest() {
            let items = Object.entries(allData).reverse().slice(0, 4);
            document.getElementById('latest-content').innerHTML = `<h3>آخر الإضافات 🔥</h3><div class="content-grid">${items.map(([id, i]) => `<div class="card"><small style="font-weight:900; color:var(--accent)">${i.subject}</small><h4 style="margin:10px 0;">${i.title}</h4><button class="btn-accent" style="font-size:14px; padding:10px;" onclick="window.open('${i.url}')">فتح المحتوى</button></div>`).join('')}</div>`;
        }

        function renderSubjectGrids() {
            const subs = ["اللغة العربية", "اللغة الإنجليزية", "الفيزياء", "الكيمياء", "الأحياء", "الرياضيات"];
            let html = "";
            subs.forEach(s => html += `<div class="subject-card" onclick="openSubject('${s}', 'video')"><i class="fas fa-graduation-cap"></i><h3>${s}</h3></div>`);
            document.getElementById('subjects-grid-video').innerHTML = html;
            document.getElementById('subjects-grid-file').innerHTML = html;
        }

        function openSubject(name, type) {
            document.getElementById(type === 'video' ? 'subjects-container-video' : 'subjects-container-file').style.display = 'none';
            document.getElementById(type === 'video' ? 'specific-subject-videos' : 'specific-subject-files').style.display = 'block';
            let h = "";
            for(let id in allData) {
                if(allData[id].subject === name) h += `<div class="card"><h4>${allData[id].title}</h4><button class="btn-accent" onclick="window.open('${allData[id].url}')">مشاهدة</button></div>`;
            }
            document.getElementById(type === 'video' ? 'video-list' : 'file-list').innerHTML = h || "لا يوجد محتوى حالياً";
        }

        function showSubjects(type) {
            document.getElementById(type === 'video' ? 'subjects-container-video' : 'subjects-container-file').style.display = 'block';
            document.getElementById(type === 'video' ? 'specific-subject-videos' : 'specific-subject-files').style.display = 'none';
        }

        function renderAdminSubjects() {
            const subs = ["اللغة العربية", "اللغة الإنجليزية", "الفيزياء", "الكيمياء", "الأحياء", "الرياضيات"];
            let h = "";
            subs.forEach(s => h += `<div class="subject-card" onclick="alert('جاهز للرفع لمادة ${s}')"><h3>${s}</h3></div>`);
            document.getElementById('admin-subjects-grid').innerHTML = h;
        }

        function tab(el, id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function logout() { localStorage.removeItem('kimo_auth_v25'); location.reload(); }
        window.onload = () => { if (localStorage.getItem('kimo_auth_v25')) runApp(); };
    </script>
</body>
</html>
